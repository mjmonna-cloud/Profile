<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maruf Jaman — Connect with me</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --fb: #1877F2;
    --ig: #E1306C;
    --wa: #25D366;
    --gm: #EA4335;
    --bg: #0d0d0d;
    --surface: #161616;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --muted: rgba(240,237,232,0.45);
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(24,119,242,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 80%, rgba(37,211,102,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 45% 30% at 60% 30%, rgba(225,48,108,0.08) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 2.5rem 2rem 2rem;
    animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1877F2, #E1306C);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: #fff;
    margin: 0 auto 1.25rem;
    letter-spacing: -0.5px;
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    text-align: center;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .tagline {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    margin-top: 6px;
    margin-bottom: 2rem;
    letter-spacing: 0.02em;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    text-decoration: none;
    color: var(--text);
    transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), background 0.15s, border-color 0.15s;
    animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  .link-btn:nth-child(1) { animation-delay: 0.08s; }
  .link-btn:nth-child(2) { animation-delay: 0.14s; }
  .link-btn:nth-child(3) { animation-delay: 0.20s; }
  .link-btn:nth-child(4) { animation-delay: 0.26s; }

  .link-btn:hover {
    transform: translateY(-2px) scale(1.01);
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.18);
  }

  .link-btn:active {
    transform: scale(0.98);
  }

  .icon-wrap {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-wrap svg { width: 22px; height: 22px; }

  .fb-icon  { background: rgba(24,119,242,0.15); }
  .ig-icon  { background: rgba(225,48,108,0.15); }
  .wa-icon  { background: rgba(37,211,102,0.15); }
  .gm-icon  { background: rgba(234,67,53,0.15);  }

  .link-info { flex: 1; }
  .link-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: -0.2px;
  }
  .link-handle {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .arrow {
    opacity: 0.3;
    flex-shrink: 0;
  }

  .footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 0.72rem;
    color: rgba(240,237,232,0.2);
    letter-spacing: 0.04em;
  }
</style>
</head>
